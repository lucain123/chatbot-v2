<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--surface:#fff;--border:#e2ddd6;
  --ink:#1a1916;--muted:#9a9690;--accent:#2d5be3;--accent-light:#eef2fd;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.bot-identity{display:flex;align-items:center;gap:.75rem}
.bot-avatar{width:36px;height:36px;border-radius:10px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:.85rem;color:var(--bg)}
.bot-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.bot-status{display:flex;align-items:center;gap:.35rem;font-size:.72rem;color:var(--muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#4ade80}

.messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem}

.msg{display:flex;gap:.7rem;max-width:680px;animation:msgIn .2s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:.65rem}
.msg.bot .msg-av{background:var(--ink);color:var(--bg)}
.msg.user .msg-av{background:var(--accent);color:#fff}
.bubble{padding:.8rem 1.05rem;border-radius:14px;font-size:.875rem;line-height:1.65;max-width:100%}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .bubble{background:var(--ink);color:#f7f5f0;border-top-right-radius:4px}
.bubble p{margin-bottom:.4rem}.bubble p:last-child{margin-bottom:0}
.bubble strong{font-weight:600}
.bubble a{color:var(--accent);text-decoration:underline;word-break:break-all}
.msg.user .bubble a{color:#a0b4f0}

.typing{display:flex;align-items:center;gap:4px;padding:.7rem .9rem}
.td{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;gap:1rem}
.welcome-av{width:64px;height:64px;border-radius:18px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:var(--bg);margin-bottom:.5rem}
.welcome h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.4rem}
.welcome p{color:var(--muted);font-size:.875rem;max-width:360px;line-height:1.6}
.chips{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:.5rem}
.chip{padding:.35rem .9rem;border:1px solid var(--border);border-radius:20px;font-size:.78rem;color:var(--muted);background:var(--surface);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--accent);color:var(--accent)}

.input-area{padding:1rem 1.5rem 1.25rem;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-bar{display:flex;gap:.65rem;align-items:flex-end;background:var(--bg);border:1.5px solid var(--border);border-radius:14px;padding:.6rem .6rem .6rem 1rem;transition:border-color .2s,box-shadow .2s}
.input-bar:focus-within{border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,25,22,.05)}
#inp{flex:1;border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:.875rem;resize:none;max-height:110px;line-height:1.5;color:var(--ink)}
#inp::placeholder{color:var(--muted)}
.send{width:34px;height:34px;flex-shrink:0;background:var(--ink);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:opacity .15s,transform .1s}
.send:hover{opacity:.75}.send:active{transform:scale(.94)}.send:disabled{opacity:.3;cursor:not-allowed}
.input-hint{font-size:.65rem;color:var(--muted);text-align:center;margin-top:.45rem}
.powered{text-align:center;font-size:.6rem;color:var(--border);margin-top:.2rem}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
</style>
</head>
<body>

<header>
  <div class="bot-identity">
    <div class="bot-avatar" id="hdr-av">A</div>
    <div>
      <div class="bot-name" id="hdr-name">Assistente</div>
      <div class="bot-status"><span class="status-dot"></span> Online</div>
    </div>
  </div>
</header>

<div class="messages" id="msgs">
  <div class="welcome" id="welcome">
    <div class="welcome-av" id="welcome-av">A</div>
    <h2 id="welcome-name">Assistente</h2>
    <p id="welcome-text">Ciao! Come posso aiutarti?</p>
    <div class="chips" id="chips"></div>
  </div>
</div>

<div class="input-area">
  <div class="input-bar">
    <textarea id="inp" rows="1" placeholder="Scrivi un messaggio…"></textarea>
    <button class="send" id="send-btn" onclick="send()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="input-hint">Invio per inviare · Shift+Invio per nuova riga</div>
  <div class="powered">powered by AI</div>
</div>

<script>
const SUPABASE_URL = 'https://dmafhgewcnmteylbiyqo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6oQJn6zDZg4Fea_sRenQNQ_PlveL9tS';

let config = {};
let history = [];
let loading = false;

async function loadConfig() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/chatbot_config?id=eq.default&select=bot_name,bot_welcome,bot_logo,fallback_email,fallback_msg`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const rows = await res.json();
    config = rows[0] || {};
  } catch(e) {}
  initUI();
}

function initUI() {
  const name = config.bot_name || 'Assistente';
  const initial = name.charAt(0).toUpperCase();
  document.title = name;
  document.getElementById('hdr-name').textContent = name;
  document.getElementById('welcome-name').textContent = name;
  document.getElementById('welcome-text').textContent = config.bot_welcome || 'Come posso aiutarti?';

  // Logo
  if (config.bot_logo) {
    const logoHtml = `<img src="${config.bot_logo}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">`;
    document.getElementById('hdr-av').innerHTML = logoHtml;
    document.getElementById('hdr-av').style.background = 'transparent';
    document.getElementById('welcome-av').innerHTML = `<img src="${config.bot_logo}" style="width:100%;height:100%;object-fit:cover;border-radius:18px">`;
    document.getElementById('welcome-av').style.background = 'transparent';
  } else {
    document.getElementById('hdr-av').textContent = initial;
    document.getElementById('welcome-av').textContent = initial;
  }
}

loadConfig();

function hideWelcome() { document.getElementById('welcome')?.remove(); }

function send() {
  if (loading) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ''; inp.style.height = 'auto';
  hideWelcome();
  addMsg('user', text);
  history.push({ role:'user', content:text });
  callBackend();
}

async function callBackend() {
  loading = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch('/.netlify/functions/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages: history })
    });
    const data = await res.json();
    hideTyping();
    if (!res.ok) throw new Error(data.error||'Errore');
    history.push({ role:'assistant', content:data.reply });
    addMsg('bot', data.reply);
  } catch(err) {
    hideTyping();
    const fb = config.fallback_email ? `Per assistenza: ${config.fallback_email}` : 'Riprova tra poco.';
    addMsg('bot', `Si è verificato un problema. ${fb}`);
  }
  loading = false;
  document.getElementById('send-btn').disabled = false;
}

function addMsg(role, text) {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = role==='bot' ? (config.bot_name||'A').charAt(0).toUpperCase() : 'Tu';
  div.innerHTML = `<div class="msg-av">${av}</div><div class="bubble">${fmt(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const el = document.createElement('div');
  el.className='msg bot'; el.id='typing';
  const av = (config.bot_name||'A').charAt(0).toUpperCase();
  el.innerHTML=`<div class="msg-av">${av}</div><div class="bubble"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop=msgs.scrollHeight;
}
function hideTyping(){ document.getElementById('typing')?.remove(); }

function fmt(text) {
  var escaped = text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
  var linked = escaped.replace(/(https?:\/\/[^\s&]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  return '<p>' + linked
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>') + '</p>';
}

const inp = document.getElementById('inp');
inp.addEventListener('input',()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,110)+'px'; });
inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
</script>
</body>
</html>
